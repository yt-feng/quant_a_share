name: Refresh Market Cache

on:
  schedule:
    - cron: "20 1,5,9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-cache
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JavaScript
        run: npm run check:pages

      - name: Build market snapshot
        run: npm run cache:market

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/data/market-cache.json
          if git diff --cached --quiet; then
            echo "No market cache changes"
          else
            git commit -m "Update market cache"
            git push
          fi
