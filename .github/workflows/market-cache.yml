name: Refresh Market Cache

on:
  schedule:
    - cron: "20 1,5,9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-cache
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      BAOSTOCK_MAX_SYMBOLS: "80"
      BAOSTOCK_LOOKBACK_DAYS: "520"
      FINANCIAL_CACHE_MAX_SYMBOLS: "160"
      FINANCIAL_CACHE_CONCURRENCY: "5"
      MARKET_CACHE_STOCK_LIMIT: "8000"
      MARKET_CACHE_REMOTE_FALLBACK_URL: "https://quant-a-share.vercel.app/api/market"
      MARKET_CACHE_REMOTE_FALLBACK_MIN_STOCKS: "4000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JavaScript
        run: npm run check:pages

      - name: Install Python data dependencies
        run: python -m pip install -r requirements.txt

      - name: Build initial market snapshot
        run: npm run cache:market

      - name: Build BaoStock snapshot
        timeout-minutes: 12
        run: npm run cache:baostock

      - name: Build financial snapshot
        run: npm run cache:financial

      - name: Build enriched market snapshot
        run: npm run cache:market

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/data/market-cache.json pages/data/baostock-cache.json pages/data/financial-cache.json
          if git diff --cached --quiet; then
            echo "No market cache changes"
          else
            git commit -m "Update market cache"
            git push
          fi
